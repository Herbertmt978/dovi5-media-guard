name: Verification

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install verification tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck
          python -m pip install --disable-pip-version-check \
            bandit==1.9.4 \
            ruff==0.15.10

      - name: Check shell scripts
        run: |
          find . -type f -name '*.sh' -print0 | xargs -0 bash -n
          find . -type f -name '*.sh' -print0 | xargs -0 shellcheck

      - name: Run shell tests
        run: |
          bash tests/test_move_dovi5_to_quarantine.sh
          bash tests/test_timer_cadence.sh
          sudo bash -c '
            TEST_SECURE_ENV_HELPER_EMULATION=0 \
            TEST_TARGET_UID="$SUDO_UID" \
            TEST_TARGET_GID="$SUDO_GID" \
            bash tests/test_install.sh
          '

      - name: Run Python tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Check Python sources
        run: |
          python -m compileall -q servarr_outbox.py dovi5_ops tools
          ruff check --output-format=github .
          ruff format --check .
          bandit -q -r dovi5_ops servarr_outbox.py tools

      - name: Verify systemd units
        run: |
          sed \
            -e 's/__TARGET_USER__/root/g' \
            -e 's|^EnvironmentFile=.*|EnvironmentFile=/dev/null|' \
            -e 's|^WorkingDirectory=.*|WorkingDirectory=/|' \
            -e 's|^ExecStart=.*|ExecStart=/bin/true|' \
            systemd/move-dovi5-to-quarantine.service.tpl \
            > /tmp/move-dovi5-to-quarantine.service
          cp systemd/move-dovi5-to-quarantine.timer /tmp/
          systemd-analyze verify \
            /tmp/move-dovi5-to-quarantine.service \
            /tmp/move-dovi5-to-quarantine.timer
